<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>TensorFlow.js: Dog Breed Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Use the power of Machine Learning to classify flowers.">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        body {
            min-height: 75rem;
            padding-top: 4.5rem;
        }

        .bd-placeholder-img {
            font-size: 1.125rem;
            text-anchor: middle;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        @media (min-width: 768px) {
            .bd-placeholder-img-lg {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
  <img src="dog_picture.jpg" width="60" height="60" class="d-inline-block align-top mr-2" alt="Dog Picture">
    <a class="navbar-brand" href="/index.html">BREED FINDER</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    </nav>

<main role="main" class="container mt-5">
    <div class="row">
        <div class="col-12">
            <div class="progress-bar progress-bar-striped bg-info progress-bar-animated mb-4">Loading Model</div>
        </div>
    </div>
    <div>
        <h2> Upload your image: </h2>
    </div>
    <div class="row">
        <div class="col-6">
            <input id="image-selector" class="form-control border-0" type="file">
        </div>
        <div class="col-6">
            <button id="predict-button" class="btn btn-warning float-right"> Classify! </button>
            <button id="refresh-button" class="btn btn-info float-right mr-2" onclick="window.location.href = '/index.html';"> Refresh </button>
        </div>
    </div>
    <hr>
    <div class="row">
        <div class="col-6">
            <h2 class="ml-3">Image</h2>
            <img id="selected-image" class="ml-3" width="250" alt="">
        </div>
        <div class="col-6">
            <h2 class="ml-5">Results</h2>
            <ol id="prediction-list"></ol>
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.2.7/dist/tf.min.js"></script>
<script src="classify.js"></script>

<script>
    document.getElementById('refresh-button').addEventListener('click', function() {
        window.location.href = "/index.html";
    });
</script>
</body>
</html>
